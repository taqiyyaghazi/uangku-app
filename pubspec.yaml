name: uangku
description: 'Uangku - Offline-first personal finance tracker with Daily Breath budgeting.'
publish_to: 'none'

version: 1.1.0+3

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2

  # State Management
  flutter_riverpod: ^3.2.1

  # Database (Drift / SQLite)
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utilities
  intl: ^0.20.2
  fl_chart: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.25.0
  build_runner: ^2.4.15

  # Testing
  mockito: ^5.4.6

  # Icons
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/icon/logo.png'
  min_sdk_android: 21 # android min sdk must be 21 or higher

flutter:
  uses-material-design: true

  assets:
    - assets/icon/logo.png
