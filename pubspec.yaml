name: uangku
description: 'Uangku - Offline-first personal finance tracker with Daily Breath budgeting.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Database (Drift / SQLite)
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utilities
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.25.0
  build_runner: ^2.4.15

  # Testing
  mockito: ^5.4.6

flutter:
  uses-material-design: true
