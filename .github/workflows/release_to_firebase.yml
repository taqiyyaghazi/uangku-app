name: Deploy Signed APK to Firebase

on:
  push:
    branches:
      - main # Trigger otomatis saat push ke branch main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java (v17)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      # Langkah 1: Decode Keystore dari Base64 ke file fisik
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # Langkah 2: Buat file key.properties secara dinamis
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      # Langkah 2b: Berikan google-services.json (PROD) untuk build
      - name: Decode Google Services Config
        run: |
          mkdir -p android/app/src/prod
          echo "${{ secrets.GOOGLE_SERVICES_PROD_BASE64 }}" | base64 --decode > android/app/src/prod/google-services.json

      # Langkah 2c: Buat file .env untuk API keys (Gemini, etc)
      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Install Dependencies
        run: flutter pub get

      # Langkah 3: Build APK Release (Signed & Obfuscated) - Menggunakan flavor prod
      - name: Build Signed APK
        run: |
          flutter build apk --flavor prod -t lib/main_prod.dart --release --obfuscate \
          --split-debug-info=build/app/outputs/symbols \
          --dart-define=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"

      # Langkah 4: Get Last Commit Message
      - name: Get Last Commit Message
        run: |
          git log -1 --pretty=format:"%s" > release-notes.txt

      # Langkah 5: Kirim ke Firebase App Distribution
      - name: Upload to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: >
            appdistribution:distribute build/app/outputs/flutter-apk/app-prod-release.apk 
            --app ${{ secrets.APP_ID }} 
            --groups "testers" 
            --release-notes-file release-notes.txt
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_CREDENTIALS }}
